# Banco
quarkus.datasource.db-kind=mysql

# Schema (Flyway aplica, Hibernate valida)
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# Swagger (em /q/docs)
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=docs

# CORS: o front consome a API de outra origem pelo browser. Em dev (quarkus:dev) cai no default
# (o dev server do Angular); no compose, a origem vem do .env via FRONTEND_ORIGIN. 
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${FRONTEND_ORIGIN:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,DELETE
quarkus.http.cors.headers=Authorization,Content-Type

# Produção (Docker Compose): conexão explícita por variáveis de ambiente, injetadas pelo compose.
# Em dev e test o Dev Services cuida do banco; este bloco só vale no perfil prod (jar empacotado).
%prod.quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# JWT (RS256, assimétrico). A chave privada assina, a pública verifica. Par de chaves de
# demo em resources (em produção, troque por um par real ou injetado). RSA em PEM é o
# caminho nativo do SmallRye.
jwt.duration=${JWT_DURATION:3600}
mp.jwt.verify.issuer=course-management
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem

# Admin inicial, semeado no startup se ainda não existir.
admin.email=${ADMIN_EMAIL:admin@unifor.br}
admin.password=${ADMIN_PASSWORD:Ab!12345}
