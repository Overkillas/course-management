# Banco
quarkus.datasource.db-kind=mysql

# Schema (Flyway aplica, Hibernate valida)
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# Swagger (em /q/docs)
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=docs

# Produção (Docker Compose): conexão explícita por variáveis de ambiente, injetadas pelo compose.
# Em dev e test o Dev Services cuida do banco; este bloco só vale no perfil prod (jar empacotado).
%prod.quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
