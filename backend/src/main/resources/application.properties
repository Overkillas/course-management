# Banco
quarkus.datasource.db-kind=mysql

# Schema (Flyway aplica, Hibernate valida)
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# Swagger (em /q/docs)
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=docs

# Produção (Docker Compose): conexão explícita por variáveis de ambiente, injetadas pelo compose.
# Em dev e test o Dev Services cuida do banco; este bloco só vale no perfil prod (jar empacotado).
%prod.quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# JWT (HS256, simétrico). O segredo, a duração e o issuer; em prod o segredo vem do .env.
# O default abaixo serve só para dev/test (precisa ter >= 32 chars para o HS256).
jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-min-32-bytes-aaaaaa}
jwt.duration=${JWT_DURATION:3600}
mp.jwt.verify.issuer=course-management
smallrye.jwt.verify.algorithm=HS256
smallrye.jwt.verify.key=${jwt.secret}

# Admin inicial, semeado no startup se ainda não existir.
admin.email=${ADMIN_EMAIL:admin@unifor.br}
admin.password=${ADMIN_PASSWORD:Ab!12345}
