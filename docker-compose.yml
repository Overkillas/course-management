name: course-management

services:
  db:
    container_name: course-management-db
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - '${DB_PORT}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: course-management-backend
    build:
      context: ./backend
    restart: always
    env_file:
      - .env
    environment:
      # Host do banco dentro da rede do compose (o nome do serviço acima).
      DB_HOST: db
    ports:
      - '${APP_PORT}:8080'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/q/health/ready']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  mysql_data:
    driver: local
