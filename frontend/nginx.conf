server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer caminho não encontrado cai no index.html, para as rotas do Angular
    # (client-side) funcionarem ao recarregar a página.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
