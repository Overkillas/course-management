<h1>Meu perfil</h1>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

@if (error()) {
  <p class="profile-error">Não foi possível carregar o perfil.</p>
}

@if (profile(); as p) {
  <mat-card class="profile-card">
    <mat-card-content>
      <p><strong>Nome:</strong> {{ p.name }}</p>
      <p><strong>E-mail:</strong> {{ p.email }}</p>
    </mat-card-content>
  </mat-card>
}
