<div class="page-header">
  <h1>Alunos</h1>
  <button mat-raised-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon>
    Novo aluno
  </button>
</div>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

@if (error()) {
  <p class="error-text">Não foi possível carregar os alunos.</p>
}

@if (!loading() && !error()) {
  @if (students().length === 0) {
    <div class="empty-state">
      <mat-icon>group</mat-icon>
      <p>Nenhum aluno cadastrado.</p>
    </div>
  } @else {
    <mat-card>
      <table mat-table [dataSource]="students()">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let student">{{ student.name }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>E-mail</th>
          <td mat-cell *matCellDef="let student">{{ student.email }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let student">
            @if (isHandset()) {
              <button
                mat-icon-button
                [matMenuTriggerFor]="rowMenu"
                [matMenuTriggerData]="{ student: student }"
                aria-label="Ações"
              >
                <mat-icon>more_vert</mat-icon>
              </button>
            } @else {
              <button mat-icon-button (click)="openEdit(student)" aria-label="Editar aluno">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="confirmDelete(student)" aria-label="Excluir aluno">
                <mat-icon>delete</mat-icon>
              </button>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>

    <mat-menu #rowMenu="matMenu">
      <ng-template matMenuContent let-student="student">
        <button mat-menu-item (click)="openEdit(student)">
          <mat-icon>edit</mat-icon>
          <span>Editar</span>
        </button>
        <button mat-menu-item (click)="confirmDelete(student)">
          <mat-icon>delete</mat-icon>
          <span>Excluir</span>
        </button>
      </ng-template>
    </mat-menu>
  }
}
