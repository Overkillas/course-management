<mat-toolbar color="primary" class="shell-toolbar">
  <mat-icon class="shell-logo">school</mat-icon>
  <span class="shell-title">Course Management</span>

  <nav class="shell-nav">
    @if (isAdmin) {
      <a mat-button routerLink="/students" routerLinkActive="shell-link-active">Alunos</a>
      <a mat-button routerLink="/courses" routerLinkActive="shell-link-active">Cursos</a>
    } @else {
      <a mat-button routerLink="/me/courses" routerLinkActive="shell-link-active">Meus cursos</a>
      <a
        mat-button
        routerLink="/me"
        routerLinkActive="shell-link-active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Meu perfil</a
      >
    }
  </nav>

  <span class="shell-spacer"></span>

  @if (email) {
    <span class="shell-email">
      <mat-icon class="shell-email-icon">account_circle</mat-icon>
      {{ email }}
    </span>
  }
  <button mat-button (click)="logout()">
    <mat-icon>logout</mat-icon>
    Sair
  </button>
</mat-toolbar>

<main class="shell-content">
  <router-outlet />
</main>
